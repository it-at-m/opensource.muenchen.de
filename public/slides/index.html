## OSPO Operations

* No FOSS without a __compelling reason__. 
  * Every transition involves __effort__, with associated costs and hassle
* IT is constantly __changing__:
  * massive, even hidden __price increases__
  * __functional__ or __operational__ changes 
  * long __life cycles__ that already cause effort
  * or __new__ IT services

## Usage Costs

* FOSS is __free speech, not free beer__
* but prevents _dictation of function or price by the vendor_
* Manufacturers exploit their __market power__ 
* Monopolies drive up prices

---

## Procurement

* __Procurement processes__ are the bane of the public sector
* but not everything has to go through an RFP
  * below the __Procurement threshold__
  * Framework agreements
* __Preference__ for FOSS is possible (OSBA – Award Criteria for Sustainable Procurement of Open Source Software)
  * OSBA Report: Award Criteria for Sustainable Procurement of Open Source Software
  * evb-it.gov.de

---


## Security

* FOSS _may_ be more secure 
* no “security through __obscurity__”
* contribute by conducting external __security tests__


[oss.muenchen.de/sec](https://oss.muenchen.de/sec)

---

## Legal

* __Liability__: only in cases of gross negligence or willful misconduct
* __Municipal Law__: Public Code _does not diminish_ our _assets_
* __Data Protection__: Developers may use _pseudonyms_.
* __Competition Law__: Every _market participant_ has _access_ to our OSS.

![Limux Tux](https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/LiMux_%28logo%29.svg/330px-LiMux_%28logo%29.svg.png#right)

* It was __not__ due to
  * Linux
  * the hardware
* _but_
   * Office is incompatible
   * for municipal specialized applications, we represent only 1.6% of citizens
   * alone, alone - even as the largest municipality
